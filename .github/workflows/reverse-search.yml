name: Reverse Search

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: reverse-search
  cancel-in-progress: false

jobs:
  fetch-addresses:
    runs-on: ubuntu-latest
    timeout-minutes: 29

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test Supabase connection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secrets"
            exit 1
          fi
          echo "Testing connection to $SUPABASE_URL ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/sodex_addresses?select=user_id&limit=1")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Supabase connection failed with HTTP $STATUS. Check your secrets."
            exit 1
          fi
          echo "Supabase connection OK."

      - name: Fetch Sodex addresses
        run: |
          python scripts/fetch_sodex_addresses.py
        env:
          START_USER_ID: "1000"
          CHECKPOINT_EVERY: "1000"
          MAX_CONSECUTIVE_MISSES: "10"
          MAX_RUNTIME_SECONDS: "1500"
          MIN_REQUEST_INTERVAL_SECONDS: "0.06"

      - name: Sync to Supabase
        if: success()
        run: |
          python scripts/sync_to_supabase.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Commit updated CSV and state
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/; then
            echo "No data changes to commit."
            exit 0
          fi

          branch="${GITHUB_REF_NAME:-main}"

          git add data/
          git commit -m "chore: update Sodex reverse search data"
          git pull --rebase origin "$branch"
          git push origin HEAD:"$branch"
